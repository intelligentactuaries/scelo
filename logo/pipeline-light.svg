<!-- Scelo pipeline diagram : soft data → brain layer → hard data.
     Explicit dark stroke (#1B1815) for use against light backgrounds.
     Paired with pipeline-dark.svg via README <picture> for theme
     awareness. Composition follows the canonical Scelo mark : the
     three nodes are an expanded version of the same three nodes in
     scelo.svg, with arrowheads and text labels added so the
     soft → tools → hard pipeline reads at a glance without a caption.
     Pure SVG; no React. -->
<svg
  xmlns="http://www.w3.org/2000/svg"
  viewBox="0 0 720 240"
  fill="none"
  stroke="#1B1815"
  stroke-width="1.75"
  stroke-linecap="round"
  stroke-linejoin="round"
  role="img"
  aria-label="The Scelo pipeline: soft data → brain layer (tools) → hard data, one-way only."
>
  <!-- Soft : hollow disc. -->
  <circle cx="120" cy="110" r="24" />

  <!-- Edge soft → tools. Body + arrowhead, both single-stroke. -->
  <path d="M150 110 H306" />
  <path d="M297 101 L306 110 L297 119" />

  <!-- Brain layer : ring + core. The two concentric circles read as
       a lens focusing soft into hard. -->
  <circle cx="360" cy="110" r="44" />
  <circle cx="360" cy="110" r="12" />

  <!-- Edge tools → hard. -->
  <path d="M414 110 H570" />
  <path d="M561 101 L570 110 L561 119" />

  <!-- Hard : hollow disc. -->
  <circle cx="600" cy="110" r="24" />

  <!-- Labels. Same colour as the strokes (fill="#1B1815",
       stroke="none") so the diagram reads as one coherent mark
       rather than a graphic-with-captions. -->
  <g
    fill="#1B1815"
    stroke="none"
    font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, system-ui, sans-serif"
  >
    <text x="120" y="180" text-anchor="middle" font-size="16">soft data</text>
    <text x="360" y="180" text-anchor="middle" font-size="16">brain layer</text>
    <text x="360" y="200" text-anchor="middle" font-size="13" opacity="0.65">(tools)</text>
    <text x="600" y="180" text-anchor="middle" font-size="16">hard data</text>
  </g>
</svg>
