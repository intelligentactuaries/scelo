<!-- Scelo pipeline diagram : soft data → brain layer → hard data.
     Explicit cream stroke (#F1ECDF) for use against dark backgrounds.
     Paired with pipeline-light.svg via README <picture> for theme
     awareness. See pipeline-light.svg for design notes — geometry is
     identical, only colour differs. -->
<svg
  xmlns="http://www.w3.org/2000/svg"
  viewBox="0 0 720 240"
  fill="none"
  stroke="#F1ECDF"
  stroke-width="1.75"
  stroke-linecap="round"
  stroke-linejoin="round"
  role="img"
  aria-label="The Scelo pipeline: soft data → brain layer (tools) → hard data, one-way only."
>
  <circle cx="120" cy="110" r="24" />
  <path d="M150 110 H306" />
  <path d="M297 101 L306 110 L297 119" />
  <circle cx="360" cy="110" r="44" />
  <circle cx="360" cy="110" r="12" />
  <path d="M414 110 H570" />
  <path d="M561 101 L570 110 L561 119" />
  <circle cx="600" cy="110" r="24" />
  <g
    fill="#F1ECDF"
    stroke="none"
    font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, system-ui, sans-serif"
  >
    <text x="120" y="180" text-anchor="middle" font-size="16">soft data</text>
    <text x="360" y="180" text-anchor="middle" font-size="16">brain layer</text>
    <text x="360" y="200" text-anchor="middle" font-size="13" opacity="0.65">(tools)</text>
    <text x="600" y="180" text-anchor="middle" font-size="16">hard data</text>
  </g>
</svg>
