<!--
  Scelo mark.

  One concept : the soft → tools → hard pipeline that Scelo IS.
    * Left hollow disc      = soft data (uncommitted)
    * Middle ring + core    = the brain layer (the "lens" focusing
                              soft into hard)
    * Right hollow disc     = hard data (board-pack-ready)

  Spec :
    * 64×64 viewBox
    * fill="none", stroke="currentColor", strokeWidth=1.5
    * round caps + joins
    * no fills, no shadows, no gradients
    * inherits its colour from the parent — themes light/dark for free

  Drop this file straight into a website or embed via <img>.
  For React, import the matching SceloLogo.tsx instead.
-->
<svg
  xmlns="http://www.w3.org/2000/svg"
  viewBox="0 0 64 64"
  fill="none"
  stroke="currentColor"
  stroke-width="1.5"
  stroke-linecap="round"
  stroke-linejoin="round"
  role="img"
  aria-label="Scelo"
>
  <circle cx="12" cy="32" r="5" />
  <path d="M18 32h6" />
  <circle cx="32" cy="32" r="9" />
  <circle cx="32" cy="32" r="3" />
  <path d="M40 32h6" />
  <circle cx="52" cy="32" r="5" />
</svg>
